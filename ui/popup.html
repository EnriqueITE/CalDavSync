<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>CalDavSync</title>
    <style>
      body {
        font: 13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        min-width: 260px;
        padding: 12px;
      }
      button {
        margin: 0 6px 8px 0;
        padding: 6px 10px;
      }
      pre {
        background: #f4f6f8;
        border: 1px solid #d8dee8;
        margin: 0;
        max-height: 260px;
        overflow: auto;
        padding: 8px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <button id="dryRun" type="button">Dry run</button>
    <button id="syncNow" type="button">Sync</button>
    <button id="options" type="button">Options</button>
    <pre id="output">Ready.</pre>
    <script src="popup.js"></script>
  </body>
</html>
